trigger:
  branches:
    include:
      - develop
      - main

pool:
  vmImage: "ubuntu-latest"

variables:
  NODE_VERSION: "20.x"

stages:
  - stage: CI
    displayName: "Build y validación"
    jobs:
      - job: Build
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: "Instalar Node.js"

          - script: npm ci
            displayName: "Instalar dependencias"

          - script: npm run lint
            displayName: "Lint"

          - script: npm run build
            displayName: "Build de producción (Vite)"

          - publish: dist
            artifact: frontend-dist
            displayName: "Publicar artefacto"

  - stage: CD
    displayName: "Despliegue a Azure Static Web Apps"
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: Deploy
        environment: "produccion"
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: frontend-dist

                - task: AzureStaticWebApp@0
                  inputs:
                    azure_static_web_apps_api_token: $(STATIC_WEB_APPS_TOKEN)
                    app_location: "/"
                    output_location: "dist"
                  displayName: "Desplegar en Static Web Apps"
